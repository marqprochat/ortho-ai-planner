services:
  database:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-ortho}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_NAME:-portalclinicas}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ortho" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: always
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ortho}:${DB_PASSWORD:-secret}@database:5432/${DB_NAME:-portalclinicas}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      PORT: 3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EASYDENTAL_API_URL: ${EASYDENTAL_API_URL:-https://prsrb.onrender.com/v1/rpc}
      EASYDENTAL_API_KEY: ${EASYDENTAL_API_KEY:-c5dd1e822c6c6d33ea712b756d9176ac}
      EASYDENTAL_CLIENT_ID: ${EASYDENTAL_CLIENT_ID:-5C9KnPvhhmQh}
      BOTCONVERSA_WEBHOOK_URL: ${BOTCONVERSA_WEBHOOK_URL:-https://new-backend.botconversa.com.br/api/v1/webhooks-automation/catch/181779/Io6W5mCqt2UU/}
      MESSAGE_DELAY_MS: ${MESSAGE_DELAY_MS:-1000}
      MESSAGE_CONCURRENT_LIMIT: ${MESSAGE_CONCURRENT_LIMIT:-5}
    ports:
      - "5174:3000"

  portal:
    build:
      context: ./apps/portal
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_PLANNER_URL: ${VITE_PLANNER_URL:-http://localhost:5172}
        VITE_DISPAROS_APP_URL: ${VITE_DISPAROS_APP_URL:-http://localhost:5175}
    restart: always
    ports:
      - "5173:80"
    environment:
      INTERNAL_BACKEND_URL: ${INTERNAL_BACKEND_URL:-http://backend:3000}
      API_HOST: ${API_HOST:-apiportal.dentalkids.com.br}
    depends_on:
      - backend

  planner:
    build:
      context: ./apps/planner
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_OPENAI_API_KEY: ${VITE_OPENAI_API_KEY:-}
        VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY:-}
    restart: always
    ports:
      - "5172:80"
    environment:
      INTERNAL_BACKEND_URL: ${INTERNAL_BACKEND_URL:-http://backend:3000}
      API_HOST: ${API_HOST:-apiportal.dentalkids.com.br}
    depends_on:
      - backend

  disparos:
    build:
      context: ./apps/disparos
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: always
    ports:
      - "5175:80"
    environment:
      INTERNAL_BACKEND_URL: ${INTERNAL_BACKEND_URL:-http://backend:3000}
      API_HOST: ${API_HOST:-apiportal.dentalkids.com.br}
    depends_on:
      - backend

volumes:
  db_data:
